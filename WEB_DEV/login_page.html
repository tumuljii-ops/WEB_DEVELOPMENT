<!DOCTYPE html>
<html>
<head>
<title>Login & Signup</title>

<style>
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#ff6a88);
  font-family:Arial;
}

.box{
  background:white;
  padding:30px;
  border-radius:15px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:8px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid gray;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#667eea,#764ba2);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.link{
  text-align:center;
  margin-top:10px;
  cursor:pointer;
  color:blue;
}
</style>
</head>

<body>

<div class="box">

<h2 align="center" id="title">Login</h2>

<form onsubmit="return handleForm()">

<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>

<p><b>Solve: <span id="num1"></span> + <span id="num2"></span> = ?</b></p>
<input type="number" id="answer" placeholder="Enter answer" required>

<button type="submit" id="btn">Login</button>

</form>

<p class="link" onclick="toggleForm()">Don't have account? Sign Up</p>

</div>

<script>
let isLogin = true;

let a = Math.floor(Math.random()*10);
let b = Math.floor(Math.random()*10);

document.getElementById("num1").innerText = a;
document.getElementById("num2").innerText = b;

function toggleForm(){
  isLogin = !isLogin;
  document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
  document.getElementById("btn").innerText = isLogin ? "Login" : "Sign Up";
  document.querySelector(".link").innerText = 
    isLogin ? "Don't have account? Sign Up" : "Already have account? Login";
}

function handleForm(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;
  let ans = document.getElementById("answer").value;

  if(ans != (a+b)){
    alert("Wrong Captcha!");
    return false;
  }

  if(isLogin){
    let storedUser = localStorage.getItem("username");
    let storedPass = localStorage.getItem("password");

    if(user === storedUser && pass === storedPass){
      alert("Login Successful!");
    } else {
      alert("Wrong Username or Password!");
    }
  } 
  else {
    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);
    alert("Signup Successful! Now Login.");
    toggleForm();
  }

  return false;
}
</script>

</body>
</html>
